<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <script src="webextension-polyfill.js"></script>
  <style>
    body {
      width: 400px;
      height: 560px;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .popup-header .logo-icon {
      width: 42px;
      height: 26px;
      background: var(--accent);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .popup-header .title {
      font-size: 15px;
      font-weight: 700;
    }

    .popup-header .title span {
      color: var(--accent);
    }

    .popup-nav {
      display: flex;
      border-bottom: 1px solid var(--border-color);
    }

    .popup-nav a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: var(--transition);
      border-bottom: 2px solid transparent;
    }

    .popup-nav a:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .popup-nav a .nav-icon {
      font-size: 16px;
    }

    .popup-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .popup-section-label {
      padding: 10px 16px 6px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-disabled);
    }

    #history-list {
      flex: 1;
      min-height: 0;
      padding: 0 16px 12px;
      overflow-y: auto;
    }

    #show-more-btn {
      margin: 8px 16px 10px;
      width: calc(100% - 32px);
      flex-shrink: 0;
    }

    .stats-bar {
      display: flex;
      padding: 8px 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .stats-col {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }

    .stats-col:first-child {
      justify-content: flex-start;
    }

    .stats-col:last-child {
      justify-content: flex-end;
    }

    .popup-stats {
      display: flex;
      gap: 0;
      align-items: center;
      min-width: 0;
    }

    .popup-stat-col {
      display: none;
    }

    .stat-text {
      font-size: 12px;
      color: var(--text-primary);
      font-weight: 500;
      white-space: nowrap;
    }

    .stat-text strong {
      color: var(--text-primary);
    }

    .popup-stat-label {
      font-size: 10px;
      letter-spacing: 0.45px;
      text-transform: uppercase;
      color: var(--text-disabled);
      line-height: 1.2;
    }

    .popup-stat-value {
      margin-top: 2px;
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .popup-stats strong {
      color: var(--text-primary);
    }

    .ghost-control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .ghost-info {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px;
      height: 15px;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      font-size: 10px;
      color: var(--text-secondary);
      cursor: help;
      user-select: none;
      line-height: 1;
    }

    .ghost-tooltip {
      position: absolute;
      left: calc(100% + 6px);
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 15, 15, 0.95);
      color: #fff;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 400;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 20;
    }

    .ghost-info:hover .ghost-tooltip,
    .ghost-info:focus-visible .ghost-tooltip {
      opacity: 1;
    }

    .stats-bar .toggle {
      width: 34px;
      height: 18px;
      flex-shrink: 0;
    }

    .stats-bar .toggle-slider {
      width: 34px;
      height: 18px;
    }

    .stats-bar .toggle-slider::before {
      width: 14px;
      height: 14px;
      left: 2px;
      top: 2px;
    }

    .stats-bar .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="popup-header">
    <div class="logo-icon">WHYT</div>
    <div class="title">WatchHistory <span>for YouTube™</span></div>
  </div>

  <!-- Navigation Links -->
  <div class="popup-nav">
    <a href="history.html" target="_blank" id="open-history">
      <span class="nav-icon">📋</span> History
    </a>
    <a href="options.html" target="_blank" id="open-options">
      <span class="nav-icon">⚙️</span> Options
    </a>
    <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">
      <span class="nav-icon">▶️</span> YouTube
    </a>
  </div>

  <!-- Stats Bar: Ghost Mode (left) + Stats (right) -->
  <div class="stats-bar">
    <!-- Left column: Ghost Mode -->
    <div class="stats-col">
      <div class="ghost-control">
        <span>Ghost Mode</span>
        <span class="ghost-info" tabindex="0" role="img" aria-label="Pauses tracking until browser restart">ⓘ
          <span class="ghost-tooltip">Pauses tracking until browser restart</span>
        </span>
        <label class="toggle" aria-label="Ghost Mode">
          <input type="checkbox" id="ghostModeToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Middle column: empty -->
    <div class="stats-col"></div>

    <!-- Right column: Stats -->
    <div class="stats-col">
      <div class="popup-stats">
        <span class="stat-text"><strong id="stat-count">0</strong>/<strong id="stat-limit">50</strong> videos tracked</span>
      </div>
    </div>
  </div>

  <div class="popup-main">
    <!-- Recent Videos -->
    <div class="popup-section-label">Recent</div>
    <div id="history-list"></div>
    <button id="show-more-btn" class="btn btn-sm hidden" style="width: calc(100% - 32px); margin: 8px 16px 10px;">Show More</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
